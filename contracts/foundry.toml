# Full reference https://github.com/foundry-rs/foundry/tree/master/crates/config
[profile.default]
solc = "0.8.35"
auto_detect_solc = false
evm_version = "osaka"
gas_reports = [
    "ForwarderBase",
    "EmergencyMigratableForwarderBase", 
    "NativeTokenReceiver", 
    "TransientFallbackHandler", 
    "Version"
]
optimizer = true
via_ir = true
optimizer_runs = 10_000
allow_internal_expect_revert = true
# Deterministic deployment settings (https://book.getfoundry.sh/guides/deterministic-deployments-using-create2#configuring-your-foundrytoml)
cbor_metadata = false
bytecode_hash = "none"


src = "src"
test = "test"
out = "out"
script = "script"
fs_permissions = [{ access = "read", path = "./" }]
libs = ["dependencies"]
auto_detect_remappings = false
remappings = [
    "@openzeppelin-contracts-5.6.1/=dependencies/@openzeppelin-contracts-5.6.1/",
    "forge-std-1.16.1/=dependencies/forge-std-1.16.1/",
    "solady-0.1.26/=dependencies/solady-0.1.26/",
]
ignored_warnings_from = [
    "dependencies/solady-0.1.26/src", # Warning 2424: Natspec memory-safe-assembly special comment for inline assembly is deprecated
]

[dependencies]
"@openzeppelin-contracts" = "5.6.1"
"forge-std" = "1.16.1"
"solady" = "0.1.26"

[soldeer]
recursive_deps = true
remappings_location = "config"
remappings_generate = true
remappings_version = true

[lint]
ignore = ["test/TransientFallbackHandler.storage.t.sol"]

[fuzz]
runs = 1_000

[profile.ci]
fuzz = { runs = 1_000 }
verbosity = 3
